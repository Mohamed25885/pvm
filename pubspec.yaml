name: pvm
description: PHP Version Manager for Windows - Switch PHP versions per-project
version: 1.0.1
repository: https://github.com/Mohamed25885/pvm
license: MIT

environment:
  sdk: ^3.4.0

# Add regular dependencies here.
dependencies:
  args: ^2.7.0
  path: ^1.9.1
  archive: ^4.0.9    # ZIP extraction (cross-platform)
  crypto: ^3.0.7     # SHA256 verification
  http: ^1.6.0       # HTTP client
  get_it: ^9.2.1     # Dependency injection

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
  mocktail: ^1.0.5
  coverage: ^1.15.0
  build_version: ^2.1.3
  build_runner: ^2.13.1
  meta: ^1.18.2
  lint_staged: ^0.5.1
  dart_pre_commit: ^6.1.1+1

dart_pre_commit:
  format: false
  analyze: true
  test: true
  outdated: false
  osv_scanner: true
