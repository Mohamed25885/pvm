  win32: ^5.5.4

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0
  mocktail: ^1.0.3
  coverage: ^1.15.0
  coverde: ^0.3.0+1
  dart_pre_commit: ^6.1.1+1
  build_version: ^2.1.1
  build_runner: ^2.4.6
  meta: ^1.16.0
  lint_staged: ^0.5.1
