name: Feature Request
description: Suggest an idea for PVM
title: "[Feature]: "
labels: ["enhancement"]
assignees: ["Mohamed25885"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to PVM! Please provide a clear and concise description of the feature.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution
      placeholder: "It would be great if PVM could..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Any alternative approaches you've considered?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, references, etc.
