name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Check outdated packages
        run: dart pub outdated

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Generate version code
        run: dart run build_runner build

      - name: Analyze code
        run: dart analyze --fatal-infos

      - name: Run tests with coverage
        run: dart test --coverage=coverage --reporter=expanded

      - name: Format coverage to LCOV
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib,pvm.dart
            
      - name: Check coverage threshold
        run: |
          dart pub global activate coverde
          dart pub global run coverde check 60 --input coverage/lcov.info

      - name: Create Build Directory
        if: matrix.os == 'windows-latest'
        run: mkdir builds -ErrorAction SilentlyContinue

      - name: Build executable
        if: matrix.os == 'windows-latest'
        run: dart compile exe pvm.dart -o builds/pvm.exe

      - name: Upload Windows Binary
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pvm-windows
          path: builds/pvm.exe

      - name: Install test (--version)
        if: matrix.os == 'windows-latest'
        run: builds/pvm.exe --version